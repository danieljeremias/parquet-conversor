# FinOps Application Buckets
source.bucket=emr-finops-metrics-db
source.prefix=usage/
target.bucket=emr-finops-metrics-db
target.prefix=usage-fixed/

# AWS Connection Settings
quarkus.s3.aws.region=us-east-1
quarkus.s3.aws.credentials.type=default
quarkus.s3.devservices.enabled=false

# Reduce known noisy warnings during parquet rewrite runs.
quarkus.log.category."org.apache.hadoop.util.NativeCodeLoader".level=ERROR
quarkus.log.category."org.apache.parquet.CorruptStatistics".level=ERROR
quarkus.log.category."org.apache.parquet.hadoop.InternalParquetRecordReader".level=ERROR

# Log File Settings
quarkus.log.file.enabled=true
quarkus.log.file.path=logs/parquet-conversor.log
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=5
quarkus.log.file.level=INFO
quarkus.log.file.rotation.file-suffix=.yyyy-MM-dd
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %s%e%n
